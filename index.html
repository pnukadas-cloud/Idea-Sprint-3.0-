<!DOCTYPE html>
<html>
<head>
<title>AI Event Planner</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    background: #121212;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #ff2d55;
}

.card {
    background: #1e1e1e;
    margin: 20px auto;
    padding: 20px;
    width: 70%;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,45,85,0.3);
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #ff2d55;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

.bubble {
    background: #2a2a2a;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<h1>🤖 AI Event Planner</h1>

<div class="card">
    <h3>🎛 Inputs</h3>

    <h4>Speaker</h4>
    Name: <input id="s_name" value="Alice"><br>
    Cost: <input id="s_cost" value="500"><br>
    Expected Audience: <input id="s_exp" value="90"><br>
    Preference: <input id="s_pref" value="95"><br>

    <h4>Venue</h4>
    Name: <input id="v_name" value="Hall A"><br>
    Capacity: <input id="v_cap" value="100"><br>

    <h4>Budget</h4>
    <input type="number" id="budget" value="1000">

    <br><br>
    <button onclick="generate()">🚀 Generate Plan</button>
    <button onclick="simulate()">⚡ Simulate Change</button>
</div>

<div class="card">
    <h3>💬 Output</h3>
    <div id="output"></div>
</div>

<script>
let originalBudget = 1000;

function generate() {

    let speaker = [{
        name: document.getElementById("s_name").value,
        cost: parseInt(document.getElementById("s_cost").value),
        expected: parseInt(document.getElementById("s_exp").value),
        preference: parseInt(document.getElementById("s_pref").value)
    }];

    let venue = [{
        name: document.getElementById("v_name").value,
        capacity: parseInt(document.getElementById("v_cap").value)
    }];

    let budget = parseInt(document.getElementById("budget").value);

    originalBudget = budget;

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({speakers: speaker, venues: venue, budget: budget})
    })
    .then(res=>res.json())
    .then(data=>{
        show(data);
        confetti({particleCount:100, spread:70});
    });
}

function simulate() {
    let newBudget = originalBudget - 200;
    document.getElementById("budget").value = newBudget;

    generate();
}

function show(data) {
    let out = document.getElementById("output");
    out.innerHTML = "";

    add("📅 Schedule:\n" + data.schedule.join("\n"));
    add("💰 Budget Used: " + data.budget);
    add("🤖 Decisions:\n" + data.explanation.join("\n"));
}

function add(text){
    let d=document.createElement("div");
    d.className="bubble";
    d.innerText=text;
    document.getElementById("output").appendChild(d);
}
</script>

</body>
</html>
