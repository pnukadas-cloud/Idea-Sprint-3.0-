<!DOCTYPE html>
<html>
<head>
<title>AI Event Planner</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    background: #121212;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #e1306c;
}

.card {
    background: #1e1e1e;
    margin: 20px auto;
    padding: 20px;
    width: 80%;
    border-radius: 12px;
}

input {
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #e1306c;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.speaker-box {
    border: 1px solid #444;
    padding: 10px;
    margin: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #444;
    padding: 8px;
}

.bubble {
    background: #2a2a2a;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🤖 AI Event Planner</h1>

<div class="card">

<h3>👥 Speakers</h3>
<div id="speakers"></div>

<button onclick="addSpeaker()">➕ Add Speaker</button>

<h3>🏟 Venue</h3>
Name: <input id="v_name" value="Hall A">
Capacity: <input id="v_cap" value="100">

<h3>💰 Budget</h3>
<input id="budget" value="1000">

<h3>🎯 Interest</h3>
<input id="interest" placeholder="AI / Robotics">

<br><br>

<button onclick="generate()">🚀 Generate Plan</button>
<button onclick="simulate()">⚡ Simulate Change</button>

</div>

<div class="card">
<h3>📊 Schedule</h3>
<div id="output"></div>
</div>

<script>
let originalBudget = 1000;

function addSpeaker() {
    let div = document.createElement("div");
    div.className = "speaker-box";

    div.innerHTML = `
    Name: <input class="name">
    Cost: <input class="cost">
    Expected: <input class="expected">
    Preference: <input class="pref">
    Topic: <input class="topic">
    `;

    document.getElementById("speakers").appendChild(div);
}

// Add one default speaker
addSpeaker();

function getSpeakers() {
    let boxes = document.querySelectorAll(".speaker-box");
    let speakers = [];

    boxes.forEach(b => {
        speakers.push({
            name: b.querySelector(".name").value,
            cost: parseInt(b.querySelector(".cost").value),
            expected: parseInt(b.querySelector(".expected").value),
            preference: parseInt(b.querySelector(".pref").value),
            topic: b.querySelector(".topic").value
        });
    });

    return speakers;
}

function generate() {
    let speakers = getSpeakers();

    let venue = [{
        name: document.getElementById("v_name").value,
        capacity: parseInt(document.getElementById("v_cap").value)
    }];

    let budget = parseInt(document.getElementById("budget").value);
    let interest = document.getElementById("interest").value;

    originalBudget = budget;

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({speakers, venues: venue, budget, interest})
    })
    .then(res=>res.json())
    .then(data=>{
        show(data);
        confetti({particleCount:120, spread:70}); // ONLY here
    });
}

function simulate() {
    let newBudget = originalBudget - 200;
    document.getElementById("budget").value = newBudget;

    fetchData(); // no confetti
}

function fetchData() {
    let speakers = getSpeakers();

    let venue = [{
        name: document.getElementById("v_name").value,
        capacity: parseInt(document.getElementById("v_cap").value)
    }];

    let budget = parseInt(document.getElementById("budget").value);
    let interest = document.getElementById("interest").value;

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({speakers, venues: venue, budget, interest})
    })
    .then(res=>res.json())
    .then(data=>{
        show(data);
    });
}

function show(data) {
    let out = document.getElementById("output");
    out.innerHTML = "";

    let table = "<table><tr><th>Speaker</th><th>Time</th><th>Venue</th></tr>";

    data.schedule.forEach(s => {
        table += `<tr>
        <td>${s.speaker}</td>
        <td>${s.slot}</td>
        <td>${s.venue}</td>
        </tr>`;
    });

    table += "</table>";

    add(table);
    add("💰 Budget Used: " + data.budget);
    add("🤖 Decisions:<br>" + data.explanation.join("<br>"));
    add("🎯 Recommended: " + (data.recommendations.join(", ") || "None"));

    data.schedule.forEach(s => {
        add(`👤 ${s.speaker} is a featured speaker.`);
    });
}

function add(text){
    let d=document.createElement("div");
    d.className="bubble";
    d.innerHTML=text;
    document.getElementById("output").appendChild(d);
}
</script>

</body>
</html>
