<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #1a001f, #000000);
        color: #fff;
        text-align: center;
    }

    h1 {
        font-size: 42px;
        margin-top: 20px;
        color: #d400ff;
        text-shadow: 0 0 20px #d400ff, 0 0 40px #8a00ff;
    }

    .container {
        width: 70%;
        margin: auto;
    }

    .card {
        background: rgba(30, 0, 40, 0.7);
        margin: 20px 0;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 25px #8a00ff;
        backdrop-filter: blur(12px);
        transition: 0.4s;
    }

    .card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 50px #d400ff;
    }

    input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        width: 150px;
        background: #1a001f;
        color: white;
        box-shadow: 0 0 10px #8a00ff;
    }

    button {
        padding: 10px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(45deg, #8a00ff, #d400ff);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 15px #8a00ff;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px #d400ff;
    }

    .loading {
        display: none;
        margin-top: 10px;
    }

    .spinner {
        border: 4px solid #333;
        border-top: 4px solid #d400ff;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        animation: spin 1s linear infinite;
        margin: auto;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    .chatbox {
        text-align: left;
        max-height: 350px;
        overflow-y: auto;
        scroll-behavior: smooth;
    }

    .bubble {
        background: #2a0033;
        margin: 10px;
        padding: 12px;
        border-radius: 12px;
        box-shadow: 0 0 15px #8a00ff;
        animation: fadeIn 0.4s ease-in;
        max-width: 80%;
    }

    .user {
        background: #4a0066;
        align-self: flex-end;
        margin-left: auto;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

</style>
