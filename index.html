<!DOCTYPE html>
<html>
<head>
<title>AI Event Planner</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    background: #121212;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #ff2d55;
}

.card {
    background: #1e1e1e;
    margin: 20px auto;
    padding: 20px;
    width: 70%;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,45,85,0.3);
}

button {
    padding: 10px 20px;
    background: #ff2d55;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

textarea {
    width: 80%;
    height: 80px;
    margin: 10px;
    border-radius: 8px;
    background: #222;
    color: white;
}

.bubble {
    background: #2a2a2a;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<h1>🤖 AI Event Planner</h1>

<div class="card">
    <h3>🎛 Inputs</h3>

    <textarea id="speakers">[{"name":"Alice","cost":500,"expected":90,"preference":95}]</textarea>
    <textarea id="venues">[{"name":"Hall A","capacity":100}]</textarea>

    <br>
    Budget: <input type="number" id="budget" value="1000">

    <br><br>
    <button onclick="generate()">🚀 Generate Plan</button>
    <button onclick="simulate()">⚡ Simulate Change</button>
</div>

<div class="card">
    <h3>💬 Output</h3>
    <div id="output"></div>
</div>

<script>
function generate() {
    let speakers = JSON.parse(document.getElementById("speakers").value);
    let venues = JSON.parse(document.getElementById("venues").value);
    let budget = parseInt(document.getElementById("budget").value);

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({speakers, venues, budget})
    })
    .then(res=>res.json())
    .then(data=>{
        show(data);

        // 🎉 CONFETTI
        confetti({particleCount:100, spread:70});
    });
}

function simulate() {
    let budget = document.getElementById("budget");
    budget.value = budget.value - 200;
    generate();
}

function show(data) {
    let out = document.getElementById("output");
    out.innerHTML = "";

    add("📅 Schedule:\n" + data.schedule.join("\n"));
    add("💰 Budget Used: " + data.budget);
    add("🤖 Decisions:\n" + data.explanation.join("\n"));
}

function add(text){
    let d=document.createElement("div");
    d.className="bubble";
    d.innerText=text;
    document.getElementById("output").appendChild(d);
}
</script>

</body>
</html>
