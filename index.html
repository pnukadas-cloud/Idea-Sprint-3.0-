<!DOCTYPE html>
<html>
<head>
<title>AI Event Planner</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    background: #121212;
    color: white;
    font-family: Arial;
    text-align: center;
}

.card {
    background: #1e1e1e;
    margin: 20px auto;
    padding: 20px;
    width: 90%;
    border-radius: 12px;
}

input {
    margin: 5px;
    padding: 8px;
}

button {
    padding: 10px;
    background: #e1306c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #444;
    padding: 10px;
}

.grid-cell {
    height: 60px;
}

.speaker-box, .venue-box {
    border: 1px solid #444;
    padding: 10px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>🤖 AI Event Planner</h1>

<div class="card">

<h3>👥 Speakers</h3>
<div id="speakers"></div>
<button onclick="addSpeaker()">➕ Add Speaker</button>

<h3>🏟 Venues</h3>
<div id="venues"></div>
<button onclick="addVenue()">➕ Add Hall</button>

<h3>💰 Budget</h3>
<input id="budget" value="1000">

<h3>🎯 Interest</h3>
<input id="interest">

<br><br>

<button onclick="generate()">🚀 Generate Plan</button>
<button onclick="simulate()">⚡ Simulate Change</button>

</div>

<div class="card">
<h3>📅 Timetable</h3>
<div id="grid"></div>
</div>

<script>
let originalBudget = 1000;

// Add Speaker
function addSpeaker() {
    let div = document.createElement("div");
    div.className = "speaker-box";

    div.innerHTML = `
    Name <input class="name">
    Cost <input class="cost">
    Expected <input class="expected">
    Preference <input class="pref">
    Topic <input class="topic">

    <button onclick="removeElement(this)" style="background:red;margin-left:10px;">
        ❌ Remove
    </button>
    `;

    document.getElementById("speakers").appendChild(div);
}
// Add Venue
function addVenue() {
    let div = document.createElement("div");
    div.className = "venue-box";

    div.innerHTML = `
    Name <input class="v_name">
    Capacity <input class="v_cap">

    <button onclick="removeElement(this)" style="background:red;margin-left:10px;">
        ❌ Remove
    </button>
    `;

    document.getElementById("venues").appendChild(div);
}
addSpeaker();
addVenue();

// Get Data
function getSpeakers() {
    let boxes = document.querySelectorAll(".speaker-box");
    let list = [];

    boxes.forEach(b => {
        list.push({
            name: b.querySelector(".name").value,
            cost: parseInt(b.querySelector(".cost").value),
            expected: parseInt(b.querySelector(".expected").value),
            preference: parseInt(b.querySelector(".pref").value),
            topic: b.querySelector(".topic").value
        });
    });

    return list;
}
function removeElement(btn) {
    btn.parentElement.remove();
}
function getVenues() {
    let boxes = document.querySelectorAll(".venue-box");
    let list = [];

    boxes.forEach(b => {
        list.push({
            name: b.querySelector(".v_name").value,
            capacity: parseInt(b.querySelector(".v_cap").value)
        });
    });

    return list;
}

// Generate
function generate() {
    let speakers = getSpeakers();
    let venues = getVenues();
    let budget = parseInt(document.getElementById("budget").value);
    let interest = document.getElementById("interest").value;

    originalBudget = budget;

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({speakers, venues, budget, interest})
    })
    .then(res => res.json())
    .then(data => {
        renderGrid(data.schedule, venues);
        showExtra(data);
        confetti({particleCount:120, spread:70});
    });
}

// Simulate (NO confetti)
function simulate() {
    document.getElementById("budget").value = originalBudget - 200;
    fetchData();
}

// Fetch without confetti
function fetchData() {
    let speakers = getSpeakers();
    let venues = getVenues();
    let budget = parseInt(document.getElementById("budget").value);
    let interest = document.getElementById("interest").value;

    fetch("/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({speakers, venues, budget, interest})
    })
    .then(res => res.json())
    .then(data => {
        renderGrid(data.schedule, venues);
        showExtra(data);
    });
}

// Grid View
function renderGrid(schedule, venues) {
    let slots = ["Mon 10AM","Tue 11AM","Wed 12PM","Thu 1PM","Fri 2PM"];

    let table = "<table><tr><th>Time</th>";

    venues.forEach(v => {
        table += `<th>${v.name}</th>`;
    });

    table += "</tr>";

    slots.forEach(slot => {
        table += `<tr><td>${slot}</td>`;

        venues.forEach(v => {
            let found = schedule.find(s => s.slot === slot && s.venue === v.name);

            table += `<td class="grid-cell">${found ? found.speaker : "-"}</td>`;
        });

        table += "</tr>";
    });

    table += "</table>";

    document.getElementById("grid").innerHTML = table;
}

// Extra Info
function showExtra(data) {
    let div = document.createElement("div");

    div.innerHTML = `
    <br>
    💰 Budget Used: ${data.budget}<br><br>

    🤖 Decisions:<br>
    ${data.explanation.join("<br>")}<br><br>

    🎯 Recommended:<br>
    ${data.recommendations.join(", ") || "None"}
    `;

    document.getElementById("grid").appendChild(div);
}
</script>

</body>
</html>
