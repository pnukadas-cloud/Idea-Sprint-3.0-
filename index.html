<!DOCTYPE html>
<html>
<head>
    <title>AI Event Planner</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .card {
            background: #2f2f4f;
            padding: 20px;
            margin: 20px auto;
            border-radius: 15px;
            width: 60%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 150px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff7a18, #ffb347);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #ffb347;
        }

        pre {
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<h1>🤖 AI Event Planning Agent</h1>
<p>Dynamic Scheduling with Smart AI Decisions</p>

<div class="card">
    <h2>🎛️ Controls</h2>
    <label>Budget:</label>
    <input type="number" id="budget" value="1000">
    <button onclick="generate()">⚡ Generate Plan</button>
</div>

<div class="card">
    <h2>📅 Schedule</h2>
    <pre id="schedule">Waiting...</pre>
</div>

<div class="card">
    <h2>💰 Budget Used</h2>
    <p id="budgetUsed">-</p>
</div>

<div class="card">
    <h2>🤖 AI Decisions</h2>
    <pre id="explanation">-</pre>
</div>

<script>
function generate() {
    let budget = document.getElementById("budget").value;

    fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({budget: budget})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("schedule").innerText = data.schedule.join("\n");
        document.getElementById("budgetUsed").innerText = "₹ " + data.budget;
        document.getElementById("explanation").innerText = data.explanation.join("\n");
    });
}
</script>

</body>
</html>
